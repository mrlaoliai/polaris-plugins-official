name: Release Plugins

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - 'v*'

jobs:
  build-go:
    name: Build Go Plugins
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: plugins/knowledge_base/go.sum
      - name: Build knowledge_base
        run: |
          cd plugins/knowledge_base
          # Build binary with standard naming: {plugin}_{os}_{arch}
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o ../../knowledge_base_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
      - name: Upload Go Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: knowledge_base_*
          retention-days: 1

  build-rust:
    name: Build Rust Plugins
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_name: linux
            arch_name: amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            os_name: darwin
            arch_name: amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            os_name: darwin
            arch_name: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
            arch_name: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: plugins/computer_use
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxdo-dev libx11-dev libxtst-dev libxcb1-dev libxkbcommon-dev libwayland-dev libpipewire-0.3-dev libspa-0.2-dev libclang-dev libegl1-mesa-dev libgbm-dev
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build computer_use
        run: |
          cd plugins/computer_use
          cargo build --release --target ${{ matrix.target }}
      - name: Rename and Move Binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp plugins/computer_use/target/${{ matrix.target }}/release/polaris-computer-mcp ./computer_use_${{ matrix.os_name }}_${{ matrix.arch_name }}
      - name: Rename and Move Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy plugins\computer_use\target\${{ matrix.target }}\release\polaris-computer-mcp.exe computer_use_${{ matrix.os_name }}_${{ matrix.arch_name }}.exe
      - name: Upload Rust Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries-${{ matrix.os_name }}-${{ matrix.arch_name }}
          path: computer_use_*
          retention-days: 1

  build-python:
    name: Build Python Plugins
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            os_name: linux
            arch_name: amd64
            python_arch: x64
          - os: macos-latest
            os_name: darwin
            arch_name: amd64
            python_arch: x64
          - os: macos-latest
            os_name: darwin
            arch_name: arm64
            python_arch: arm64
          - os: windows-latest
            os_name: windows
            arch_name: amd64
            python_arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python_arch }}
      - name: Install dependencies
        run: |
          cd plugins/browser_use
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build with PyInstaller
        run: |
          cd plugins/browser_use
          pyinstaller --onefile --name browser_use_${{ matrix.os_name }}_${{ matrix.arch_name }} server.py
      - name: Rename and Move Binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp plugins/browser_use/dist/browser_use_${{ matrix.os_name }}_${{ matrix.arch_name }} ./browser_use_${{ matrix.os_name }}_${{ matrix.arch_name }}
      - name: Rename and Move Binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy plugins\browser_use\dist\browser_use_${{ matrix.os_name }}_${{ matrix.arch_name }}.exe browser_use_${{ matrix.os_name }}_${{ matrix.arch_name }}.exe
      - name: Upload Python Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-binaries-${{ matrix.os_name }}-${{ matrix.arch_name }}
          path: browser_use_*
          retention-days: 1

  release:
    name: Publish Release
    needs: [build-go, build-rust, build-python]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
