openapi: 3.0.1
info:
  title: Browser Use Plugin
  description: A plugin that allows the assistant to execute browser actions such as navigating, clicking, typing, and taking screenshots.
  version: 'v1'
servers:
  - url: http://localhost:0
paths:
  /browser_use_action:
    post:
      operationId: browserUseAction
      summary: Execute a browser action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [navigate, click, type, screenshot]
                  description: The browser action to perform.
                url:
                  type: string
                  description: "The URL to navigate to (if action=navigate)"
                selector:
                  type: string
                  description: "The CSS or XPath selector (if action=click or type)"
                text:
                  type: string
                  description: "The text to type (if action=type)"
              required:
                - action
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        text:
                          type: string
                        data:
                          type: string
                          description: Base64 encoded image data if screenshot.
                        mimeType:
                          type: string
