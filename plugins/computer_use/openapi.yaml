openapi: 3.0.1
info:
  title: Computer Use Plugin
  description: A plugin that allows the assistant to execute computer actions such as moving the mouse, clicking, typing, and taking screenshots.
  version: 'v1'
servers:
  - url: http://localhost:0
paths:
  /computer_use_action:
    post:
      operationId: computerUseAction
      summary: Execute a computer action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [screenshot, left_click, right_click, double_click, mouse_move, left_click_drag, type, key]
                  description: The action to perform.
                coordinate:
                  type: array
                  items:
                    type: number
                  description: "[x, y] coordinates for mouse actions."
                text:
                  type: string
                  description: Text to type or key to press.
              required:
                - action
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        text:
                          type: string
                        data:
                          type: string
                          description: Base64 encoded image data if screenshot.
                        mimeType:
                          type: string
